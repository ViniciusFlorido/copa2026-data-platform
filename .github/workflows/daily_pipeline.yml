name: Pipeline Diário — Copa 2026

on:
  # Roda todo dia às 23h (horário de Brasília = 02:00 UTC)
  schedule:
    - cron: "0 2 * * *"

  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:
    inputs:
      target_date:
        description: "Data alvo (YYYY-MM-DD). Deixe vazio para usar hoje."
        required: false
        default: ""
      season:
        description: "Season da Copa (2022 para testes, 2026 para ao vivo)"
        required: false
        default: "2026"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configura Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instala dependências
        run: |
          pip install requests python-dotenv pandas pyarrow \
                      dbt-core dbt-duckdb scikit-learn xgboost \
                      lightgbm mlflow schedule kaggle

      # ── ETAPA 1 — INGESTÃO ──────────────────────────────────
      - name: "Etapa 1 — Ingestão diária (API-Football)"
        env:
          API_FOOTBALL_KEY:      ${{ secrets.API_FOOTBALL_KEY }}
          WORLD_CUP_LEAGUE_ID:   "1"
          WORLD_CUP_SEASON:      ${{ github.event.inputs.season || '2026' }}
          RAW_PATH:              data/raw
          BRONZE_PATH:           data/bronze
          SILVER_PATH:           data/silver
          GOLD_PATH:             data/gold
        run: |
          DATE_ARG="${{ github.event.inputs.target_date }}"
          if [ -n "$DATE_ARG" ]; then
            python src/ingestion/fetch_matches.py "$DATE_ARG"
          else
            python src/ingestion/fetch_matches.py
          fi

      # ── ETAPA 2 — BRONZE ────────────────────────────────────
      - name: "Etapa 2 — Pipeline Bronze"
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python src/pipeline/bronze.py

      # ── ETAPA 3 — SILVER ────────────────────────────────────
      - name: "Etapa 3 — Pipeline Silver"
        run: python src/pipeline/silver.py

      # ── ETAPA 4 — GOLD ──────────────────────────────────────
      - name: "Etapa 4 — Pipeline Gold"
        run: python src/pipeline/gold.py

      # ── ETAPA 5 — MODELOS ML ────────────────────────────────
      - name: "Etapa 5 — Retreina modelos ML"
        run: |
          python src/models/xg_model.py
          python src/models/prediction_model.py
          python src/models/clustering.py

      # ── SALVA ARTEFATOS ─────────────────────────────────────
      - name: Salva dados processados como artefato
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_id }}
          path: |
            data/gold/
            models/
          retention-days: 30

      # ── NOTIFICAÇÃO DE SUCESSO ──────────────────────────────
      - name: Pipeline concluído
        run: |
          echo "✅ Pipeline Copa 2026 concluído com sucesso!"
          echo "   Data: $(date)"
          echo "   Artefatos salvos por 30 dias"
